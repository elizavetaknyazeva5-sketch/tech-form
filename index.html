<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Создание B2B сайтов с фокусом на KPI и бизнес-цели" />
  <title>Tech Form — B2B сайты</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: #1a1a1a;
      background: #ffffff;
      line-height: 1.6;
    }

    .container {
      width: 1200px;
      max-width: 90%;
      margin: 0 auto;
    }

    /* HEADER */

    .header {
      background: #4d795b;
      padding: 20px 0;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-weight: 600;
    }

    .logo img {
      height: 40px;
    }

    .nav a {
      margin-left: 30px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
    }

    /* HERO */

    .hero {
      padding: 100px 0;
    }

    .hero h1 {
      font-size: 36px;
      max-width: 800px;
      margin-bottom: 40px;
    }


    /* RESPONSIVE */

    @media (max-width: 992px) {
      .metrics,
      .cases-grid,
      .steps-grid {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 28px;
      }
    
    
  .hero-inner {
    flex-direction: column;
    text-align: center;
  }

  .hero-image {
    text-align: center;
  }
}
  </style>
</head>

<body>

<header class="header">
  <div class="container header-inner">
    <div class="logo">
      <img src="images/image-89-6.png" alt="Tech Form Logo">
      <span>Tech Form</span>
    </div>

    <nav class="nav">
      <a href="#">Услуги и стоимость</a>
      <a href="#">Работы и результаты</a>
      <a href="#">Блог</a>
      <a href="#">Калькулятор стоимости</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="container hero-inner">

    <div class="hero-content">
      <h1>
        Создание сайтов и сервисов для B2B,
        встраивающихся в ваши бизнес-цели
      </h1>

    <div class="hero-image">
      <img src="https://res.cloudinary.com/dcettbtpr/image/upload/v1772542894/Frame_220_wpktyg.png" 
           alt="Создание сайтов для B2B">
    </div>

  </div>
</section>


<section class="contacts">
  <div class="container">
    <h2>Контакты</h2>
    <p>Почта: flow-design.bizml.ru</p>
    <p>Телефон: +7 (917) 213-50-57</p>
    <p>Telegram: https://t.me/flow_design_work</p>
  </div>
</section>

</body>
</html>
